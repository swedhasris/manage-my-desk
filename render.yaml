# render.yaml — Infrastructure as Code for Render.com
# Render reads this file automatically on every deploy.
# Docs: https://render.com/docs/blueprint-spec
#
# This uses Render's FREE managed PostgreSQL database — no external credentials needed.
# Render creates the DB automatically and injects DATABASE_URL.
# DatabaseEnvironmentPostProcessor converts postgres:// → jdbc:postgresql:// at startup.
# Hibernate creates all tables automatically via ddl-auto=update on first boot.

databases:
  - name: manage-my-desk-db
    databaseName: connectit_db
    user: connectit
    plan: free

services:
  - type: web
    name: manage-my-desk-backend
    runtime: docker
    dockerfilePath: ./microservices/core-service-springboot/Dockerfile
    dockerContext: ./microservices/core-service-springboot
    plan: free
    healthCheckPath: /actuator/health

    envVars:
      # ── Database — Render managed PostgreSQL (auto-injected) ───────────────
      - key: DATABASE_URL
        fromDatabase:
          name: manage-my-desk-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: manage-my-desk-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: manage-my-desk-db
          property: password

      # ── Hibernate — PostgreSQL dialect (matches Render's managed DB) ───────
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

      # ── Server ────────────────────────────────────────────────────────────
      - key: PORT
        value: "10000"

      # ── JWT ───────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        value: ConnectIT_2026_Secure_JWT_Key_987654321_minimum_32_characters

      # ── Email / SMTP ──────────────────────────────────────────────────────
      - key: EMAIL_HOST
        value: smtp.office365.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USER
        value: support@technosprint.net
      - key: EMAIL_PASSWORD
        value: Poland@01
      - key: EMAIL_FROM
        value: support@technosprint.net
      - key: MAIL_FROM_NAME
        value: Manage My Desk

      # ── IMAP ──────────────────────────────────────────────────────────────
      - key: IMAP_HOST
        value: outlook.office365.com
      - key: IMAP_PORT
        value: "993"
      - key: IMAP_USER
        value: support@technosprint.net
      - key: IMAP_PASS
        value: Poland@01

      # ── Gemini AI ─────────────────────────────────────────────────────────
      - key: GEMINI_API_KEY
        value: AIzaSyD7X-NZaDxd_J381on_io8Tvx1LTMDyRqk

      # ── Microsoft Graph ───────────────────────────────────────────────────
      - key: GRAPH_TENANT_ID
        value: dc9c3a4c-20c8-4af8-beeb-e0fbd4d8be82
      - key: GRAPH_CLIENT_ID
        value: 22021859-ed30-4ded-840b-b05c7e34c4e1
      - key: GRAPH_CLIENT_SECRET
        sync: false   # Set this in Render dashboard — Azure AD client secret
      - key: GRAPH_USER_EMAIL
        value: support@technosprint.net

      # ── CORS ──────────────────────────────────────────────────────────────
      - key: CORS_ALLOWED_ORIGINS
        value: https://tech-nllq.onrender.com,https://*.onrender.com

